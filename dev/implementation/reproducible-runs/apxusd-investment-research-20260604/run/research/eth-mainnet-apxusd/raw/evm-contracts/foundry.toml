[profile.default]
src = "src"
out = "out"
libs = ["lib", "dependencies"]

fs_permissions = [
    { access = "read-write", path = "./config.toml" },
    { access = "read-write", path = "./out" },
    { access = "read-write", path = "./deploy" },
    { access = "read-write", path = "./reports" },
]

ignored_error_codes = [
    5667, # unused parameter
    5574, # contract size
    3860, # init code size
]
ignored_warnings_from = [
    "cmds/",
    # Dependencies
    "dependencies/forge-std-1.11.0/src/StdConfig.sol",
    "dependencies/@openzeppelin-contracts-5.5.0/utils/TransientSlot.sol",
    "dependencies/chainlink-evm-contracts-v1.5.0/",
    "dependencies/chainlink-local-0.2.3/",
]

[profile.release]
solc_version = "0.8.30"
optimizer = true

# Skip compiling test files
test = "skip"

[profile.optimized]
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
arbitrum = "${ARBITRUM_RPC_URL}"
mainnet = "${ETHEREUM_RPC_URL}"

[lint]
exclude_lints = [
    "mixed-case-variable",
    "mixed-case-function",
    "pascal-case-struct",
]

[soldeer]
remappings_generate = false
remappings_regenerate = false

[invariant]
fail_on_revert = true
runs = 256            # Number of test runs
depth = 1024          # Calls per run
